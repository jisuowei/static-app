/* catalog */
.pokit-catalog {
	display: none;
	position: absolute;
	z-index: 4;
	top: 0;
	right: 0;
	bottom: 0;
	left: 0;
	background: rgba(0,0,0, .4);
}

.pokit-catalog .catalog-list {
	box-sizing: border-box;
	position: absolute;
	top: 0;
	right: -640px;
	bottom: 0;
	width: 640px;
	padding: 60px 40px;
	background: #fff;
	transition: right .3s;
}

.pokit-catalog.on .catalog-list {
	right: 0;
}

.pokit-catalog .catalog-list .list-title {
	font-size: 20px;
}

.pokit-catalog .catalog-list .list-box {
	box-sizing: border-box;
	position: absolute;
	top: 120px;
	right: 40px;
	bottom: 60px;
	left: 40px;
	overflow-y: scroll;
	background: #fff;
	font-size: 14px;
}


.pokit-catalog .catalog-list .list-box ul a {
	display: block;
	position: relative;
	padding: 4px 20px;
	font-size: 12px;
	line-height: 16px;
	cursor: pointer;
}

.pokit-catalog .catalog-list .list-box ul a:hover {
	background: #f2f2f2;
}

.pokit-catalog .catalog-list .list-box ul a.on::before {
	content: "";
	display: block;
	position: absolute;
	top: 6px;
	left: 0;
	width: 0;
	height: 0;
	border: 6px solid transparent;
	border-left-color: #000;
}


/* 滚动条 */
::-webkit-scrollbar {
	position: absolute;
	width: 5px;
}
::-webkit-scrollbar-button {
	height: 0;
}
::-webkit-scrollbar-track {
}
::-webkit-scrollbar-track-piece {
}
::-webkit-scrollbar-thumb {
	background: #aaa;
	border-radius: 5px;
}
::-webkit-scrollbar-thumb:hover {
	background: #999;
}
::-webkit-scrollbar-thumb:active {
	background: #888;
}
::-webkit-scrollbar-corner {
}
::-webkit-resizer {
}

		<a title="上一张" class="prev"></a>
		<a title="下一张" class="next"></a>
	</div>

<script src="https://apps.bdimg.com/libs/jquery/2.1.1/jquery.min.js"></script>
<script src="./nce-list.js"></script>
<script type="text/javascript">
	
(function() {

	String.prototype.toHTMLEntity = function () {
		let arr = this.split('');
		res = '';

		arr.forEach(function (o, i) {
			res += '&#' + o.charCodeAt() + ';';
		});

		return res;
	}

	let pokit = {

		data: {
			titles: {
				nce: {
					catalog: 'New Concept English',
					mixed: 'First listen and then answer the question.<br>听录音， 然后回答以下问题。',
					words: 'New words and expressions 生词和短语',
					notes: 'Notes on the text 课文注释',
					translation: '参考译文'
				},
			}
		},

		init: function() {

			let name = 'nce';

			// $('head').append('<link rel="stylesheet" type="text/css" href="css/pokit_'+ name +'.css">');

			let title = this.data.titles[name];
			$('.J_catalogTitle').html(title.catalog);
			$('.J_pokitMixedTitle').html(title.mixed);
			$('.J_pokitWordsTitle').html(title.words);
			$('.J_pokitNotesTitle').html(title.notes);
			$('.J_pokitTranslationTitle').html(title.translation);

			this.initEvent();
			this.getPokitListByName(name);
		},


		// 事件代理
		initEvent: function() {

			let that = this;

			$('body')
				// 目录
				.on('click', '.J_showCatalog', function() {
					$(this).toggleClass('on');
					$('.J_catalogBox').fadeToggle(300).toggleClass('on');
				})
				.on('click', '.J_showCatalog a', function() {

				})

				// 跳转
				.on('click', '.J_pokitList a', function() {
					let $item = $(this),
						id    = $item.data('id');

					$item.addClass('on').siblings().removeClass('on');
					$('.J_showCatalog').removeClass('on');
					$('.J_catalogBox').fadeOut(300).removeClass('on');

					that.getPokitById(id);
				})

				// 上下页
				.on('click', '.J_pokitSider .prev, .J_pokitSider .next', function() {
					let isNext = $(this).hasClass('next'),
						$prev  = $('.J_pokitList a.on').prev(),
						$next  = $('.J_pokitList a.on').next();

					if ( isNext && $next  ) {
						$next.trigger('click');
					} else if ( $prev ) {
						$prev.trigger('click');
					}

				})

				// 编辑模式
				.on('dblclick', '.J_pokitMixedTitle', function() {
					$('.J_pokitText, .J_pokitWords, .J_pokitNotes, .J_pokitTranslation').attr('contenteditable','true');
				})

				// 实体字符
				.on('dblclick', '.J_pokitWordsTitle', function() {
					let html = '';

					$('.J_pokitWords p').each(function(i, o) {

						let arr = $(o).text().split('/');

						arr[1]  = arr[1].toHTMLEntity();

						html += '<p>'+ arr.join('/') +'</p>';
					});

					console.log(html);
				})


		},  // initEvent


		// 获取目录
		getPokitListByName: function(name) {

			let that = this;

			// $.ajax({
			// 	type: 'POST', dataType: 'json',
			// 	url: '../../../api/get/pokit.php',
			// 	data: { name: name },
			// 	success: function(data) {
					let pokitId = localStorage.getItem('POKIT_NCE_STATIC');

					// if ( data.result ) {
						// let list = data.rows,
						let list = NCE_LIST,
							html = '';

						list.forEach(function(o, i) {
							let on = o.id === pokitId ? 'on' : '';

							html += `<a class="${ on }" data-id="${ o.id }">${ o.title }</a>`;
						});

						$('.J_pokitList').html(html);

						if ( pokitId ) {
							$('.J_pokitList a.on').trigger('click');
						} else {
							$('.J_pokitList a').eq(0).trigger('click');
						}

					// }
			// 	}
			// });

		},  // getPokitListByName


		// 获取数据
		getPokitById: function(pokitId) {

			localStorage.setItem('POKIT_NCE_STATIC', pokitId);

			// $.ajax({
			// 	type: 'POST', dataType: 'json',
			// 	url: '../../../api/get/pokit.php',
			// 	data: { id: pokitId },
			// 	success: function(data) {
			// 		if ( data.result ) {
						// data = data.rows[0];

						var data = NCE_LIST.find(o => o.id === pokitId)
						$('.J_pokitTitle').html( data.title );
						$('.J_pokitText').html( data.text );
						$('.J_pokitImage').css({ backgroundImage: `url(${data.illustration})` })
						$('.J_pokitWords').html( data.words );
						$('.J_pokitNotes').html( data.notes );
						$('.J_pokitTranslation').html( data.translation );
						$('.J_pokitId').text( data.id );
			// 		}
			// 	}
			// });

		},  // getPokitById


	};

	pokit.init();

})();


</script>
</body>
</html>
